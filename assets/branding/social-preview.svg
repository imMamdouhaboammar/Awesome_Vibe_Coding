<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3" />
    </pattern>

    <!-- Logo Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>

    <!-- Fonts -->
    <style>
      .title-text {
        fill: #F9FAFB;
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 68px;
        letter-spacing: -0.03em;
      }
      .tagline-text {
        fill: #9CA3AF;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        font-size: 24px;
        line-height: 1.5;
      }
      .pill-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.05em;
        fill: #FFFFFF;
        text-anchor: middle;
      }
      .stroke-light {
        stroke: #374151;
      }
      .stroke-accent {
        stroke: #4B5563;
        stroke-width: 1.5;
        stroke-dasharray: 4 4;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Abstract Radial Glow -->
  <circle cx="200" cy="315" r="300" fill="#2563EB" opacity="0.15" filter="blur(80px)" />
  <circle cx="900" cy="200" r="250" fill="#0D9488" opacity="0.1" filter="blur(80px)" />

  <!-- Left: Large Brand Symbol -->
  <g transform="translate(100, 140)">
    <!-- Container Box -->
    <rect x="0" y="0" width="260" height="260" rx="48" fill="#111827" fill-opacity="0.6" stroke="#4B5563" stroke-width="3" />
    <rect x="20" y="20" width="220" height="220" rx="36" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 4" />
    
    <!-- Isometric stack scaled up -->
    <path d="M 130,55 L 130,205" stroke="#4B5563" stroke-width="3" stroke-dasharray="6 6" />

    <!-- Bottom Card (Tools) -->
    <path d="M 130,165 L 200,193 L 130,221 L 60,193 Z" fill="url(#blue-grad)" opacity="0.85" />
    
    <!-- Middle Card (Skills) -->
    <path d="M 130,115 L 200,143 L 130,171 L 60,143 Z" fill="url(#teal-grad)" opacity="0.9" />
    
    <!-- Top Card (Prompts) -->
    <path d="M 130,65 L 200,93 L 130,121 L 60,93 Z" fill="url(#orange-grad)" />

    <!-- Spark node -->
    <circle cx="130" cy="65" r="7" fill="#FFFFFF" />
    <circle cx="130" cy="65" r="14" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Right: Brand Typography -->
  <text x="440" y="220" class="title-text">Awesome Vibe Coding</text>
  
  <text x="440" y="280" class="tagline-text">
    <tspan x="440" dy="0">A curated guide to tools, prompts, workflows, and systems</tspan>
    <tspan x="440" dy="36">for building better AI-assisted applications.</tspan>
  </text>

  <!-- Categories Pill Row 1 -->
  <g transform="translate(440, 380)">
    <!-- Prompts -->
    <g transform="translate(0, 0)">
      <rect width="110" height="34" rx="17" fill="#8B5CF6" />
      <text x="55" y="21" class="pill-text">PROMPTS</text>
    </g>
    <!-- Skills -->
    <g transform="translate(125, 0)">
      <rect width="100" height="34" rx="17" fill="#3B82F6" />
      <text x="50" y="21" class="pill-text">SKILLS</text>
    </g>
    <!-- Tools -->
    <g transform="translate(240, 0)">
      <rect width="90" height="34" rx="17" fill="#10B981" />
      <text x="45" y="21" class="pill-text">TOOLS</text>
    </g>
    <!-- Workflows -->
    <g transform="translate(345, 0)">
      <rect width="130" height="34" rx="17" fill="#F59E0B" />
      <text x="65" y="21" class="pill-text">WORKFLOWS</text>
    </g>
  </g>

  <!-- Categories Pill Row 2 -->
  <g transform="translate(440, 430)">
    <!-- Learning -->
    <g transform="translate(0, 0)">
      <rect width="115" height="34" rx="17" fill="#EC4899" />
      <text x="57.5" y="21" class="pill-text">LEARNING</text>
    </g>
    <!-- Guides -->
    <g transform="translate(130, 0)">
      <rect width="100" height="34" rx="17" fill="#14B8A6" />
      <text x="50" y="21" class="pill-text">GUIDES</text>
    </g>
    <!-- Playbooks -->
    <g transform="translate(245, 0)">
      <rect width="120" height="34" rx="17" fill="#92400E" />
      <text x="60" y="21" class="pill-text">PLAYBOOKS</text>
    </g>
  </g>

  <!-- Bottom Strip decoration -->
  <rect x="0" y="618" width="1200" height="12" fill="#2563EB" />
  <rect x="400" y="618" width="400" height="12" fill="#0D9488" />
  <rect x="800" y="618" width="400" height="12" fill="#F97316" />

  <!-- Tiny layout crosses or markers -->
  <path d="M 1130,70 L 1150,70 M 1140,60 L 1140,80" fill="none" stroke="#4B5563" stroke-width="1.5" />
  <circle cx="1140" cy="70" r="5" fill="none" stroke="#4B5563" stroke-width="1.5" />
</svg>
