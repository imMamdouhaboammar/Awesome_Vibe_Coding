<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <defs>
    <style>
      .brand-text {
        fill: #111827;
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 38px;
        letter-spacing: -0.02em;
      }
      .brand-subtext {
        fill: #4B5563;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.2em;
      }
      .stroke-main {
        stroke: #E5E7EB;
      }
      .stroke-accent {
        stroke: #111827;
      }
      .accent-blue { fill: #2563EB; }
      .accent-teal { fill: #0D9488; }
      .accent-orange { fill: #F97316; }
      .connection-line {
        stroke: #9CA3AF;
        stroke-width: 1.5;
        stroke-dasharray: 3 3;
      }

      @media (prefers-color-scheme: dark) {
        .brand-text {
          fill: #F9FAFB;
        }
        .brand-subtext {
          fill: #9CA3AF;
        }
        .stroke-main {
          stroke: #374151;
        }
        .stroke-accent {
          stroke: #F9FAFB;
        }
        .accent-blue { fill: #3B82F6; }
        .accent-teal { fill: #14B8A6; }
        .accent-orange { fill: #F97316; }
        .connection-line {
          stroke: #4B5563;
        }
      }
    </style>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>
  </defs>

  <!-- Outline container box -->
  <rect x="15" y="15" width="90" height="90" rx="20" fill="none" class="stroke-main" stroke-width="2" />
  
  <!-- Technical Grid overlay inside box -->
  <line x1="60" y1="15" x2="60" y2="105" class="stroke-main" stroke-width="0.5" stroke-dasharray="2 2" />
  <line x1="15" y1="60" x2="105" y2="60" class="stroke-main" stroke-width="0.5" stroke-dasharray="2 2" />

  <!-- Flow connection line -->
  <path d="M 60,30 L 60,90" class="connection-line" />

  <!-- Stacked isometric-style cards representing Prompts, Skills, Tools -->
  <!-- Bottom Card (Tools) -->
  <path d="M 60,70 L 90,82 L 60,94 L 30,82 Z" fill="url(#blue-grad)" opacity="0.85" />
  
  <!-- Middle Card (Skills) -->
  <path d="M 60,50 L 90,62 L 60,74 L 30,62 Z" fill="url(#teal-grad)" opacity="0.9" />
  
  <!-- Top Card (Prompts) -->
  <path d="M 60,30 L 90,42 L 60,54 L 30,42 Z" fill="url(#orange-grad)" />

  <!-- Spark/Node on top -->
  <circle cx="60" cy="30" r="3" fill="#FFFFFF" />

  <!-- Brand Typography -->
  <text x="130" y="62" class="brand-text">Awesome Vibe Coding</text>
  <text x="132" y="86" class="brand-subtext">THE CURATED AI BUILDER PLAYBOOK</text>

  <!-- Technical Details on the right (like layout crosshairs) -->
  <path d="M 550,45 L 570,45 M 560,35 L 560,55" fill="none" class="stroke-main" stroke-width="1.5" />
  <circle cx="560" cy="45" r="5" fill="none" class="stroke-main" stroke-width="1.5" />
</svg>
