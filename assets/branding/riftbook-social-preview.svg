<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3" />
    </pattern>

    <!-- Fonts -->
    <style>
      .title-text {
        fill: #F8FAFC;
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 80px;
        letter-spacing: -0.03em;
      }
      .subtitle-text {
        fill: #38BDF8;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 600;
        font-size: 24px;
        letter-spacing: 0.15em;
      }
      .tagline-text {
        fill: #94A3B8;
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 400;
        font-size: 20px;
        line-height: 1.6;
      }
      .pill-text {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.05em;
        fill: #FFFFFF;
        text-anchor: middle;
      }
      .stroke-light {
        stroke: #334155;
      }
      .page-bg {
        fill: #0B1120;
      }
      .page-stroke {
        stroke: #38BDF8;
      }
      .path-line {
        stroke: #F59E0B;
        stroke-width: 4;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Abstract Radial Glow -->
  <circle cx="200" cy="315" r="300" fill="#38BDF8" opacity="0.15" filter="blur(80px)" />
  <circle cx="900" cy="200" r="250" fill="#F59E0B" opacity="0.08" filter="blur(80px)" />

  <!-- Left: Large Brand Symbol -->
  <g transform="translate(100, 140)">
    <!-- Container Box -->
    <rect x="0" y="0" width="260" height="260" rx="48" fill="#0B1120" fill-opacity="0.6" stroke="#334155" stroke-width="3" />
    <rect x="20" y="20" width="220" height="220" rx="36" fill="none" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="4 4" />
    
    <!-- Guidelines -->
    <line x1="130" y1="20" x2="130" y2="240" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2 2" />
    <line x1="20" y1="130" x2="240" y2="130" stroke="#1E293B" stroke-width="0.5" stroke-dasharray="2 2" />

    <!-- Isometric/2D book stack scaled up -->
    <!-- Left Page -->
    <path d="M 117,82 C 98,82 76,93 61,97 L 61,175 C 76,171 98,160 117,160 Z" class="page-bg page-stroke" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Right Page -->
    <path d="M 143,82 C 162,82 184,93 199,97 L 199,175 C 184,171 162,160 143,160 Z" class="page-bg page-stroke" stroke-width="4" stroke-linejoin="round" />

    <!-- Pathway bridging the gap -->
    <path d="M 82,134 Q 108,121 130,130 T 178,126" class="path-line" />

    <!-- Nodes -->
    <circle cx="82" cy="134" r="8" fill="#38BDF8" />
    <circle cx="130" cy="130" r="10" fill="#F59E0B" stroke="#0B1120" stroke-width="3" />
    <circle cx="178" cy="126" r="8" fill="#10B981" />
  </g>

  <!-- Right: Brand Typography -->
  <text x="440" y="210" class="title-text">Riftbook</text>
  <text x="442" y="255" class="subtitle-text">AWESOME VIBE CODING SPACE</text>
  
  <text x="440" y="320" class="tagline-text">
    <tspan x="440" dy="0">A curated guide to tools, prompts, workflows, and systems</tspan>
    <tspan x="440" dy="32">for building better AI-assisted applications.</tspan>
  </text>

  <!-- Categories Pill Row 1 -->
  <g transform="translate(440, 420)">
    <!-- Prompts -->
    <g transform="translate(0, 0)">
      <rect width="110" height="34" rx="17" fill="#8B5CF6" />
      <text x="55" y="21" class="pill-text">PROMPTS</text>
    </g>
    <!-- Skills -->
    <g transform="translate(125, 0)">
      <rect width="100" height="34" rx="17" fill="#3B82F6" />
      <text x="50" y="21" class="pill-text">SKILLS</text>
    </g>
    <!-- Tools -->
    <g transform="translate(240, 0)">
      <rect width="90" height="34" rx="17" fill="#10B981" />
      <text x="45" y="21" class="pill-text">TOOLS</text>
    </g>
    <!-- Workflows -->
    <g transform="translate(345, 0)">
      <rect width="130" height="34" rx="17" fill="#F59E0B" />
      <text x="65" y="21" class="pill-text">WORKFLOWS</text>
    </g>
  </g>

  <!-- Categories Pill Row 2 -->
  <g transform="translate(440, 470)">
    <!-- Learning -->
    <g transform="translate(0, 0)">
      <rect width="115" height="34" rx="17" fill="#EC4899" />
      <text x="57.5" y="21" class="pill-text">LEARNING</text>
    </g>
    <!-- Guides -->
    <g transform="translate(130, 0)">
      <rect width="100" height="34" rx="17" fill="#14B8A6" />
      <text x="50" y="21" class="pill-text">GUIDES</text>
    </g>
    <!-- Playbooks -->
    <g transform="translate(245, 0)">
      <rect width="120" height="34" rx="17" fill="#92400E" />
      <text x="60" y="21" class="pill-text">PLAYBOOKS</text>
    </g>
  </g>

  <!-- Bottom Strip decoration -->
  <rect x="0" y="618" width="1200" height="12" fill="#38BDF8" />
  <rect x="400" y="618" width="400" height="12" fill="#10B981" />
  <rect x="800" y="618" width="400" height="12" fill="#F59E0B" />

  <!-- Tiny layout crosses or markers -->
  <path d="M 1130,70 L 1150,70 M 1140,60 L 1140,80" fill="none" stroke="#334155" stroke-width="1.5" />
  <circle cx="1140" cy="70" r="5" fill="none" stroke="#334155" stroke-width="1.5" />
</svg>
